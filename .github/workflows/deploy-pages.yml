name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Le code publié est minifié (illisible) ; le code source lisible
      # ne quitte jamais le dépôt.
      - name: Minifier le code publié
        run: |
          npx --yes esbuild@0.25.0 brigade-verte-v3/js/*.js --minify --format=esm --outdir=brigade-verte-v3/js --allow-overwrite
          npx --yes esbuild@0.25.0 brigade-verte-v3/service-worker.js --minify --outfile=brigade-verte-v3/service-worker.js --allow-overwrite
          npx --yes esbuild@0.25.0 brigade-verte-v3/css/*.css --minify --outdir=brigade-verte-v3/css --allow-overwrite

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Publier l'application (brigade-verte-v3 à la racine du site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: brigade-verte-v3

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
