<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#0F6B3A">
<meta name="robots" content="noindex, nofollow">
<title>Suivi de tournée — Brigade Verte Amiens</title>
<link rel="icon" type="image/svg+xml" href="../assets/logo/logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/icon-32.png">
<link rel="apple-touch-icon" href="../assets/icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Suivi tournée">
<style>
/* ═══════════════════════════════════════════════════════════════════
   Suivi de tournée — Brigade Verte Amiens (fichier unique)
   Design terrain : contraste élevé, grandes cibles tactiles, sobre.
   ═══════════════════════════════════════════════════════════════════ */
:root{
  --ground:#EEF1F5; --card:#FFFFFF; --card-2:#F6F8FB;
  --ink:#111A25; --muted:#5A6B80; --line:#DBE2EC;
  --brand:#0F6B3A; --brand-ink:#FFFFFF;
  --accent:#1E56C4; --accent-ink:#FFFFFF;
  --ok:#137A42; --ok-soft:#E1F1E8; --ok-ink:#FFFFFF;
  --pb:#C43C10; --pb-soft:#FBE7DC; --pb-ink:#FFFFFF;
  --todo:#EBEFF4; --shadow:0 1px 2px rgba(17,26,37,.07),0 2px 10px rgba(17,26,37,.05);
  --radius:14px;
}
@media (prefers-color-scheme:dark){
  :root{
    --ground:#0B1119; --card:#141D28; --card-2:#0F1620;
    --ink:#E8EEF6; --muted:#94A4B8; --line:#243040;
    --brand:#1F9E5C; --brand-ink:#04140B;
    --accent:#4F86E8; --accent-ink:#05101F;
    --ok:#39B56E; --ok-soft:#0F2C1D; --ok-ink:#04140B;
    --pb:#EF8A4C; --pb-soft:#33210F; --pb-ink:#0B1119;
    --todo:#1B2734; --shadow:0 1px 2px rgba(0,0,0,.4);
  }
}
:root[data-theme="light"]{color-scheme:light}
:root[data-theme="dark"]{color-scheme:dark}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--ground); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px; line-height:1.45; -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
button{font:inherit; cursor:pointer; color:inherit; border:0; background:none}
input,textarea{font:inherit; color:var(--ink)}
:focus-visible{outline:3px solid var(--accent); outline-offset:2px}
.tnum{font-variant-numeric:tabular-nums}
.empty,.sug-empty,.num-empty{color:var(--muted); text-align:center; padding:20px 8px; font-size:14px}

/* En-tête */
.top{
  position:sticky; top:0; z-index:30; background:var(--card);
  border-bottom:1px solid var(--line); box-shadow:var(--shadow);
  padding:10px 14px 8px; padding-top:calc(10px + env(safe-area-inset-top));
}
.brandline{display:flex; align-items:center; gap:10px}
.brandline .logo{width:30px;height:30px;border-radius:8px;background:var(--brand);display:grid;place-items:center;color:var(--brand-ink);font-size:16px}
.brandline h1{font-size:15.5px; font-weight:800; margin:0; flex:1; letter-spacing:-.01em}
.save-dot{font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap}
.stats-strip{display:flex; gap:7px; margin-top:9px}
.stat{flex:1; background:var(--card-2); border:1px solid var(--line); border-radius:10px; padding:6px 4px; text-align:center}
.stat b{display:block; font-size:18px; font-weight:800; line-height:1.05}
.stat span{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em}
.stat.s-pb b{color:var(--pb)}

/* Vues */
main{max-width:720px; margin:0 auto; padding:12px 12px 96px}
.view{display:none; animation:fade .18s ease both}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.view{animation:none}}

.subbar{display:flex; align-items:center; gap:10px; margin-bottom:12px}
.back{width:42px;height:42px;flex:none;border-radius:11px;background:var(--card);border:1px solid var(--line);font-size:20px;box-shadow:var(--shadow)}
.subbar h2{font-size:17px; font-weight:800; margin:0; flex:1; display:flex; align-items:center; gap:8px}
.subbar h2::before{content:"";width:10px;height:10px;border-radius:3px;background:var(--sc,var(--brand))}
.subbar .count{font-size:12px; color:var(--muted); font-weight:700}

/* Recherche */
.search-wrap{position:relative; margin-bottom:14px}
.search-input{
  width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:12px;
  background:var(--card); box-shadow:var(--shadow); font-size:15.5px;
}
.search-input::placeholder{color:var(--muted)}
.suggest{
  position:absolute; left:0; right:0; top:calc(100% + 6px); z-index:20;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  box-shadow:0 8px 30px rgba(17,26,37,.18); overflow:hidden; max-height:60vh; overflow-y:auto;
}
.sug-item{display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; padding:13px 14px; border-bottom:1px solid var(--line); text-align:left; font-size:15px}
.sug-item:last-child{border-bottom:0}
.sug-item:active{background:var(--card-2)}

/* Secteurs */
.hello{font-size:13px; color:var(--muted); margin:2px 2px 14px}
.sector-grid{display:flex; flex-direction:column; gap:10px}
.sector-card{
  display:flex; align-items:center; gap:14px; width:100%; text-align:left;
  background:var(--card); border:1px solid var(--line); border-left:6px solid var(--sc);
  border-radius:var(--radius); padding:16px 14px; box-shadow:var(--shadow);
  transition:transform .08s ease;
}
.sector-card:active{transform:scale(.99)}
.sc-emoji{font-size:26px; width:44px; height:44px; flex:none; display:grid; place-items:center; background:color-mix(in srgb,var(--sc) 16%,transparent); border-radius:12px}
.sc-body{flex:1; min-width:0; display:flex; flex-direction:column; gap:4px}
.sc-name{font-size:17px; font-weight:800}
.sc-meta{font-size:12.5px; color:var(--muted)}
.sc-pb{color:var(--pb)}
.sc-bar{height:6px; border-radius:99px; background:var(--todo); overflow:hidden; margin-top:3px}
.sc-bar i{display:block; height:100%; background:var(--sc); transition:width .25s}
.sc-go{font-size:26px; color:var(--muted); font-weight:400}

/* Liste rues */
.street-list{display:flex; flex-direction:column; gap:7px}
.st-row{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:14px; box-shadow:var(--shadow); transition:transform .08s ease;
}
.st-row:active{transform:scale(.995)}
.st-name{flex:1; font-weight:650; font-size:15.5px}
.st-go{color:var(--muted); font-size:20px}
.pill{font-size:11.5px; font-weight:800; padding:4px 10px; border-radius:99px; white-space:nowrap}
.pill.todo{background:var(--todo); color:var(--muted)}
.pill.wip{background:var(--todo); color:var(--accent)}
.pill.done{background:var(--ok-soft); color:var(--ok)}
.pill.pb{background:var(--pb-soft); color:var(--pb)}

/* Détail rue */
.street-head{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin-bottom:12px}
.street-head .sec{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
.street-head .sec::before{content:"";width:9px;height:9px;border-radius:3px;background:var(--sc,var(--brand))}
.street-head h2{font-size:20px; margin:5px 0 2px; font-weight:800}
.street-prog{font-size:13px; color:var(--muted); font-weight:600}
.note-lbl{display:block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:14px 0 6px}
.street-note{width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:11px; background:var(--card-2); resize:vertical; min-height:44px}
.street-note::placeholder{color:var(--muted)}
.bulk-ras{width:100%; margin-top:12px; padding:14px; border-radius:12px; border:2px solid var(--ok); background:var(--ok-soft); color:var(--ok); font-weight:800; font-size:15.5px}
.bulk-ras.on{background:var(--ok); color:var(--ok-ink)}

.num-toolbar{margin-bottom:10px}
.num-filter{width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:11px; background:var(--card); font-size:15px}
.num-filter::placeholder{color:var(--muted)}
.load{display:flex; align-items:center; gap:10px; color:var(--muted); font-size:14px; padding:14px 4px; justify-content:center}
.spin{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}

.num-list{display:flex; flex-direction:column; gap:8px}
.num{border:1px solid var(--line); border-radius:12px; background:var(--card); box-shadow:var(--shadow); overflow:hidden}
.num.n-ok{border-color:var(--ok)}
.num.n-pb{border-color:var(--pb)}
.num-top{display:flex; align-items:stretch; gap:0}
.num-face{flex:1; display:flex; align-items:center; gap:12px; padding:14px 14px; text-align:left; min-height:60px}
.num-n{font-size:21px; font-weight:800; min-width:56px}
.num-tag{font-size:13px; font-weight:800; color:var(--muted)}
.num.n-ok .num-face{background:var(--ok-soft)} .num.n-ok .num-tag{color:var(--ok)}
.num.n-pb .num-face{background:var(--pb-soft)} .num.n-pb .num-tag{color:var(--pb)}
.num-warn{width:64px; flex:none; font-size:22px; border-left:1px solid var(--line); background:var(--card-2)}
.num.n-pb .num-warn{background:var(--pb); color:var(--pb-ink)}

.num-detail{display:none; padding:0 12px 12px; border-top:1px dashed var(--line)}
.num.n-pb .num-detail{display:block; padding-top:12px}
.obj-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px}
@media(min-width:460px){.obj-grid{grid-template-columns:repeat(3,1fr)}}
.obj-btn{padding:13px 8px; border-radius:11px; border:2px solid var(--line); background:var(--card); font-weight:700; font-size:14px; min-height:48px}
.obj-btn.on{background:var(--pb); border-color:var(--pb); color:var(--pb-ink)}
.num-note{width:100%; margin-top:10px; padding:11px 13px; border:1px solid var(--line); border-radius:10px; background:var(--card-2); resize:vertical; min-height:44px}
.num-note::placeholder{color:var(--muted)}

.manual{display:flex; gap:8px; margin-top:4px}
.manual-inp{flex:1; min-width:0; padding:12px 13px; border:1px dashed var(--line); border-radius:11px; background:var(--card-2); font-size:15px}
.manual-inp::placeholder{color:var(--muted)}
.manual-btn{width:56px; flex:none; border-radius:11px; border:1px dashed var(--accent); color:var(--accent); font-size:22px; font-weight:800; background:var(--card)}

/* Bouton flottant compte rendu */
.fab{
  position:fixed; left:50%; transform:translateX(-50%); bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:25; background:var(--brand); color:var(--brand-ink); font-weight:800; font-size:15.5px;
  padding:15px 26px; border-radius:99px; box-shadow:0 8px 24px rgba(15,107,58,.35); display:flex; gap:8px; align-items:center;
}

/* Compte rendu */
.exports{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px}
.exp{padding:13px 8px; border-radius:11px; border:1px solid var(--line); background:var(--card); font-weight:700; font-size:14px; box-shadow:var(--shadow); min-height:48px; display:flex; align-items:center; justify-content:center; gap:6px}
.exp.primary{background:var(--accent); border-color:var(--accent); color:var(--accent-ink); grid-column:1 / -1}
.agent-field{margin-bottom:14px}
.agent-field label{display:block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:6px}
.agent-field input{width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:11px; background:var(--card)}

.doc{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px}
.doc-head h2{font-size:18px; margin:0 0 3px}
.doc-sub{font-size:12.5px; color:var(--muted); margin:0}
.doc-meta{font-size:12px; color:var(--muted); margin:4px 0 0}
.kpis{display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin:14px 0}
@media(min-width:460px){.kpis{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--card-2); border:1px solid var(--line); border-radius:11px; padding:10px; text-align:center}
.kpi b{display:block; font-size:20px; font-weight:800}
.kpi span{font-size:11px; color:var(--muted)}
.kpi-pb b{color:var(--pb)}
.doc-none{color:var(--ok); font-weight:800; padding:12px 0}
.doc-h3{font-size:14px; margin:18px 0 8px}
.doc-close{font-size:12px; color:var(--muted); margin-top:16px; border-top:1px solid var(--line); padding-top:12px}

.tbl-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line); border-radius:10px}
table.rep{border-collapse:collapse; width:100%; font-size:13px}
table.rep th{background:var(--brand); color:#fff; font-size:11px; text-transform:uppercase; letter-spacing:.03em; padding:9px; text-align:left}
table.rep td{border-top:1px solid var(--line); padding:8px 9px; vertical-align:top}
table.rep td.n{font-weight:800; white-space:nowrap; font-variant-numeric:tabular-nums}
table.rep td.obj{color:var(--pb); font-weight:600}
tr.grp-sec td{background:color-mix(in srgb,var(--sc) 16%,transparent); font-weight:800; color:var(--ink); border-left:4px solid var(--sc)}
tr.grp-rue td{background:var(--card-2); font-weight:700; font-size:12.5px}

.reset-line{margin-top:16px}
.reset-btn{width:100%; padding:12px; border-radius:11px; border:1px solid var(--line); background:none; color:var(--muted); font-weight:600; font-size:14px}

/* Toast */
.toast{position:fixed; left:50%; bottom:calc(80px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(8px);
  background:var(--ink); color:var(--ground); padding:11px 20px; border-radius:99px; font-weight:700; font-size:14px;
  opacity:0; pointer-events:none; transition:.2s; z-index:60; white-space:nowrap; box-shadow:0 6px 20px rgba(0,0,0,.3)}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

/* Impression / PDF */
@media print{
  .top,.subbar,.fab,.exports,.agent-field,.reset-line,.toast{display:none !important}
  body{background:#fff; color:#000}
  main{padding:0; max-width:none}
  .view{display:none !important}
  #view-report{display:block !important}
  .doc{border:0; box-shadow:none; padding:0}
  table.rep th{background:#0F6B3A !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  tr.grp-sec td,tr.grp-rue td{-webkit-print-color-adjust:exact; print-color-adjust:exact}
}
</style>
</head>
<body>

<header class="top">
  <div class="brandline">
    <span class="logo">🌿</span>
    <h1>Suivi de tournée</h1>
    <span class="save-dot" id="saveDot" role="status" aria-live="polite">💾 Enregistré</span>
  </div>
  <div class="stats-strip">
    <div class="stat"><b id="hRues" class="tnum">0</b><span>rues</span></div>
    <div class="stat"><b id="hNums" class="tnum">0</b><span>numéros</span></div>
    <div class="stat s-pb"><b id="hPb" class="tnum">0</b><span>anomalies</span></div>
  </div>
</header>

<main>

  <!-- VUE 1 : SECTEURS -->
  <section id="view-sectors" class="view active" aria-label="Choix du secteur">
    <p class="hello">Match France / Maroc — dispositif préventif. Choisissez un secteur, puis une rue.</p>
    <div class="search-wrap">
      <input id="globalSearch" class="search-input" type="search" placeholder="🔎 Rechercher une rue (tous secteurs)…" autocomplete="off" aria-label="Rechercher une rue">
      <div id="globalSuggest" class="suggest" hidden></div>
    </div>
    <div id="sectorGrid" class="sector-grid"></div>
  </section>

  <!-- VUE 2 : RUES DU SECTEUR -->
  <section id="view-streets" class="view" aria-label="Rues du secteur">
    <div class="subbar">
      <button class="back" id="backStreets" aria-label="Retour aux secteurs">‹</button>
      <h2 id="streetsTitle">Secteur</h2>
      <span class="count" id="streetCount">0 rues</span>
    </div>
    <div class="search-wrap">
      <input id="streetFilter" class="search-input" type="search" placeholder="Filtrer les rues…" autocomplete="off" aria-label="Filtrer les rues">
    </div>
    <div id="streetList" class="street-list"></div>
  </section>

  <!-- VUE 3 : DÉTAIL D'UNE RUE -->
  <section id="view-street" class="view" aria-label="Contrôle de la rue">
    <div class="subbar">
      <button class="back" id="backStreet" aria-label="Retour à la liste des rues">‹</button>
      <h2>Contrôle rue</h2>
    </div>

    <div class="street-head">
      <span class="sec" id="streetSector">Secteur</span>
      <h2 id="streetName">Rue</h2>
      <div class="street-prog" id="streetProg">Chargement…</div>
      <label class="note-lbl" for="streetNote">Observation générale sur la rue</label>
      <textarea id="streetNote" class="street-note" placeholder="Ex. : rue barrée, travaux, commerce fermé…"></textarea>
      <button class="bulk-ras" id="bulkRas">✓ Toute la rue RAS</button>
    </div>

    <div class="num-toolbar">
      <input id="numFilter" class="num-filter" type="search" placeholder="Aller à un numéro…" autocomplete="off" aria-label="Filtrer les numéros">
    </div>
    <div class="load" id="numLoad" hidden><span class="spin"></span> Chargement des numéros de la rue…</div>
    <div id="numList" class="num-list"></div>
  </section>

  <!-- VUE 4 : COMPTE RENDU -->
  <section id="view-report" class="view" aria-label="Compte rendu">
    <div class="subbar">
      <button class="back" id="backReport" aria-label="Retour">‹</button>
      <h2>Compte rendu</h2>
    </div>

    <div class="agent-field">
      <label for="agentInput">Agent / équipage</label>
      <input id="agentInput" placeholder="Ex. : Brigade 2 — M. Dupont" autocomplete="off">
    </div>

    <div class="exports">
      <button class="exp primary" id="expShare">📤 Partager</button>
      <button class="exp" id="expWhatsapp">🟢 WhatsApp</button>
      <button class="exp" id="expSms">💬 SMS</button>
      <button class="exp" id="expMail">✉️ Mail</button>
      <button class="exp" id="expCopy">📋 Copier</button>
      <button class="exp" id="expPrint">🖨️ PDF / Imprimer</button>
      <button class="exp" id="expCsv">📄 CSV</button>
      <button class="exp" id="expXls">📊 Excel</button>
    </div>

    <div class="doc" id="reportDoc"></div>

    <div class="reset-line">
      <button class="reset-btn" id="resetBtn">🗑 Nouvelle tournée (tout effacer)</button>
    </div>
  </section>

</main>

<button class="fab" id="goReport">📋 Compte rendu</button>
<div class="toast" id="toast" role="status" aria-live="assertive"></div>

<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════
   Application de suivi de tournée — Brigade Verte Amiens.
   Un seul fichier : constantes → état → données → compte rendu → interface.
   Navigation : Secteur → Rue → Numéros. Objectif : rapidité terrain.
   ══════════════════════════════════════════════════════════════════ */
(function () {

// ── Constantes ───────────────────────────────────────────────────────
var SECTEURS = ["CENTRE", "NORD", "SUD", "EST", "OUEST"];
var SECTOR_META = {
  CENTRE: { label: "Centre", color: "#7c5cff", emoji: "🏛️" },
  NORD:   { label: "Nord",   color: "#16a34a", emoji: "⬆️" },
  SUD:    { label: "Sud",    color: "#f59e0b", emoji: "⬇️" },
  EST:    { label: "Est",    color: "#ef4444", emoji: "➡️" },
  OUEST:  { label: "Ouest",  color: "#2563eb", emoji: "⬅️" },
};
// Boutons rapides d'anomalie = catégories terrain demandées.
var OBJETS = ["Bac OM", "Bac Jaune", "Conteneur Veolia", "Mobilier Commerce",
  "Objet", "Encombrant", "Dépôt", "Autre"];
var ADRESSE_API = "https://api-adresse.data.gouv.fr/search/";
var AMIENS_CITYCODE = "80021";
var KEY = "brigade-suivi-v1";

// ── Petits utilitaires ───────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function el(tag, cls, txt) {
  var n = document.createElement(tag);
  if (cls) n.className = cls;
  if (txt != null) n.textContent = txt;
  return n;
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
  });
}
function norm(s) {

}

}

// ── État + persistance (hors ligne) ──────────────────────────────────
function fresh() {

    startedAt: null, lastAt: null, streets: {} };
}
var state = fresh();
function load() {
  try {
    var saved = JSON.parse(localStorage.getItem(KEY) || "null");
    if (saved && typeof saved === "object") { var f = fresh(); for (var k in f) if (!(k in saved)) saved[k] = f[k]; Object.assign(state, saved); }
  } catch (e) { /* stockage indisponible : état par défaut */ }
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }
var saveTimer = null;
function saveSoon() { clearTimeout(saveTimer); saveTimer = setTimeout(save, 250); }
function touch() {
  var iso = new Date().toISOString();
  if (!state.startedAt) state.startedAt = iso;
  state.lastAt = iso;
}
function resetAll() { var a = state.agent; state = fresh(); state.agent = a; save(); }
function streetState(name) {
  var d = state.streets[name];
  if (!d) { d = { fetched: false, nums: [], note: "", firstAt: null, lastAt: null }; state.streets[name] = d; }
  if (!Array.isArray(d.nums)) d.nums = [];

}
function touchStreet(d) {

function numCounts(d) {
  var ok = 0, pb = 0;
  for (var i = 0; i < d.nums.length; i++) { if (d.nums[i].k === "ok") ok++; else if (d.nums[i].k === "pb") pb++; }
  return { total: d.nums.length, ok: ok, pb: pb, seen: ok + pb };
}
function streetHasPb(d) { return d.nums.some(function (x) { return x.k === "pb"; }); }
function streetIsDone(d) { var c = numCounts(d); return c.total > 0 && c.seen === c.total && c.pb === 0; }
function streetTouched(d) { return !!(d.note && d.note.trim()) || d.nums.some(function (x) { return x.k; }); }

// ── Données rues + secteurs + numéros officiels ──────────────────────
var RUES = [];
function loadStreets() {
  return fetch("../data/streets.json").then(function (r) { return r.json(); })
    .then(function (list) {
      RUES = Array.isArray(list) ? list.filter(function (x) { return x && x.rue && x.secteur; }) : [];
    })
    .catch(function () { RUES = []; })
    .then(function () { RUES.sort(function (a, b) { return a.rue.localeCompare(b.rue, "fr"); }); });
}
function streetsOfSector(sec) { return RUES.filter(function (r) { return r.secteur === sec; }); }
function sectorCounts() {
  var c = {}; SECTEURS.forEach(function (s) { c[s] = 0; });
  RUES.forEach(function (r) { if (c[r.secteur] != null) c[r.secteur]++; });
  return c;
}
function sectorOfStreet(name) {
  for (var i = 0; i < RUES.length; i++) if (RUES[i].rue === name) return RUES[i].secteur;
  return "CENTRE";
}
function searchStreets(query, limit) {
  limit = limit || 40;
  var q = norm(query);
  if (!q) return [];
  var terms = q.split(" ").filter(Boolean);
  var scored = [];
  for (var i = 0; i < RUES.length; i++) {
    var hay = norm(RUES[i].rue), score = 0, ok = true;
    for (var t = 0; t < terms.length; t++) {
      var idx = hay.indexOf(terms[t]);
      if (idx === -1) { ok = false; break; }
      score += idx === 0 ? 3 : 1;
    }
    if (ok) scored.push({ r: RUES[i], score: score - hay.length * 0.001 });
  }
  scored.sort(function (a, b) { return b.score - a.score; });
  return scored.slice(0, limit).map(function (x) { return x.r; });
}
function baseName(name) { return name.replace(/\(.*?\)/g, "").trim(); }
function fetchHouseNumbers(name) {
  var q = baseName(name), target = norm(q);
  var url = ADRESSE_API + "?q=" + encodeURIComponent(q) + "&citycode=" + AMIENS_CITYCODE +
    "&type=housenumber&autocomplete=0&limit=100";
  return fetch(url).then(function (r) {
    if (!r.ok) return null;
    return r.json().then(function (j) {
      var seen = {}, out = [];
      (j.features || []).forEach(function (f) {
        var p = f.properties || {};
        if (!p.housenumber) return;
        if (norm(p.street || p.name).indexOf(target) === -1) return;
        var k = norm(p.housenumber);
        if (seen[k]) return; seen[k] = 1;
        out.push(String(p.housenumber));
      });
      out.sort(function (a, b) { return numKey(a) - numKey(b) || a.localeCompare(b, "fr"); });
      return out;
    });
  }).catch(function () { return null; });
}

// ── Compte rendu (modèle + rendu + exports) ──────────────────────────
function fmtDuration(ms) {
  if (!ms || ms < 0) return "—";
  var min = Math.round(ms / 60000), h = Math.floor(min / 60), m = min % 60;
  return h ? (h + " h " + String(m).padStart(2, "0")) : (m + " min");
}
function dateLong() {
  return new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
function hm(iso) { return iso ? new Date(iso).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }) : "—"; }
function nowHM() { return new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }

function buildModel() {
  var bySector = {}; SECTEURS.forEach(function (s) { bySector[s] = []; });
  var rues = 0, ruesDone = 0, numsSeen = 0, numsPb = 0, notes = [];
  Object.keys(state.streets).forEach(function (name) {
    var d = state.streets[name];
    if (!streetTouched(d)) return;
    var sec = sectorOfStreet(name), c = numCounts(d);
    rues++; if (streetIsDone(d)) ruesDone++;
    numsSeen += c.seen; numsPb += c.pb;
    var anomalies = d.nums.filter(function (x) { return x.k === "pb"; })
      .map(function (x) { return { n: x.n, objs: x.objs.slice(), note: (x.note || "").trim() }; })
      .sort(function (a, b) { return numKey(a.n) - numKey(b.n) || a.n.localeCompare(b.n, "fr"); });
    if (d.note && d.note.trim()) notes.push({ rue: name, sec: sec, note: d.note.trim() });
    bySector[sec].push({ rue: name, counts: c, anomalies: anomalies });
  });
  SECTEURS.forEach(function (s) { bySector[s].sort(function (a, b) { return a.rue.localeCompare(b.rue, "fr"); }); });
  var started = state.startedAt ? new Date(state.startedAt).getTime() : 0;
  var last = state.lastAt ? new Date(state.lastAt).getTime() : 0;
  return { bySector: bySector, notes: notes,
    stats: { rues: rues, ruesDone: ruesDone, numsSeen: numsSeen, numsPb: numsPb, duration: fmtDuration(last - started) },
    startedAt: state.startedAt, lastAt: state.lastAt };
}

// ── Interface : navigation + rendu ───────────────────────────────────
var currentSector = null, currentStreet = null;

function showView(name) {

  for (var i = 0; i < views.length; i++) views[i].classList.toggle("active", views[i].id === "view-" + name);
  window.scrollTo({ top: 0 });

function nav(view, data, push) {
  data = data || {};
  if (push !== false) history.pushState(Object.assign({ view: view }, data), "", "#" + view + (data.sector ? "/" + data.sector : ""));
  applyRoute(view, data);
}
function applyRoute(view, data) {
  if (view === "sectors") { renderSectors(); showView("sectors"); }
  else if (view === "streets") { currentSector = data.sector; renderStreetList(); showView("streets"); }
  else if (view === "street") { currentStreet = data.street; currentSector = data.sector || currentSector; renderStreet(); showView("street"); }
  else if (view === "report") { renderReport($("reportDoc")); showView("report"); }
  var fab = $("goReport"); if (fab) fab.hidden = view === "report";

}

function globalStats() {
  var rues = 0, nums = 0, pb = 0;
  Object.keys(state.streets).forEach(function (n) {
    var d = state.streets[n];
    if (!streetTouched(d)) return;
    var c = numCounts(d); rues++; nums += c.seen; pb += c.pb;
  });
  return { rues: rues, nums: nums, pb: pb };
}
function updateHeader() {

function sectorProgress(sec) {
  var streets = streetsOfSector(sec), done = 0, pb = 0;
  streets.forEach(function (r) {
    var d = state.streets[r.rue]; if (!d) return;
    if (streetIsDone(d)) done++;
    if (streetHasPb(d)) pb++;

}

  var filter = $("numFilter");

  filter.oninput = function () { renderNums(d, filter.value); };
  $("bulkRas").onclick = function () {

    else { d.nums.forEach(function (x) { if (x.k !== "pb") x.k = "ok"; }); touchStreet(d); }

  };

function updateStreetHeader(d) {

  $("streetProg").textContent = c.total
    ? (c.seen + "/" + c.total + " numéros" + (c.pb ? " · " + c.pb + " anomalie" + (c.pb > 1 ? "s" : "") : ""))

function ensureNumbers(d) {
  if (d.fetched) return Promise.resolve();
  $("numLoad").hidden = false;
  return fetchHouseNumbers(currentStreet).then(function (got) {
    $("numLoad").hidden = true;
    d.fetched = true;
    if (got && got.length) {
      var have = {}; d.nums.forEach(function (x) { have[norm(x.n)] = 1; });
      got.forEach(function (n) { if (!have[norm(n)]) d.nums.push({ n: n, k: "", objs: [], note: "" }); });
      save();
    }
  });
}
function renderNums(d, filter) {

  var q = norm(filter);
  var shown = q ? d.nums.filter(function (x) { return norm(x.n).indexOf(q) !== -1; }) : d.nums;
  if (!d.nums.length) {
    var warn = el("div", "num-empty");

}
function numRow(d, rec) {

  }
  face.addEventListener("click", function () {
    rec.k = rec.k === "ok" ? "" : "ok";
    if (rec.k === "ok") touchStreet(d);
    save(); paint(); updateStreetHeader(d); updateHeader();
  });
  warn.addEventListener("click", function () {
    rec.k = rec.k === "pb" ? "" : "pb";
    if (rec.k === "pb") touchStreet(d);
    save(); paint(); updateStreetHeader(d); updateHeader();
    if (rec.k === "pb") setTimeout(function () { noteInput.scrollIntoView({ block: "nearest", behavior: "smooth" }); }, 60);
  });
  paintObjs(); paint();
  return wrap;
}
function manualAdder(d) {
  var row = el("div", "manual");
  var inp = el("input", "manual-inp");
  inp.placeholder = "Ajouter un n° (ex. 12 bis)"; inp.autocomplete = "off";
  var btn = el("button", "manual-btn", "＋");
  function add() {
    var v = inp.value.trim(); if (!v) return;
    var exists = d.nums.some(function (x) { return norm(x.n) === norm(v); });
    if (!exists) d.nums.push({ n: v, k: "", objs: [], note: "" });
    inp.value = ""; save(); renderNums(d, $("numFilter").value); updateStreetHeader(d);
  }
  btn.addEventListener("click", add);
  inp.addEventListener("keydown", function (e) { if (e.key === "Enter") add(); });
  row.appendChild(inp); row.appendChild(btn);
  return row;
}

function initGlobalSearch() {
  var input = $("globalSearch"), box = $("globalSuggest");
  input.addEventListener("input", function () {
    box.textContent = "";
    if (input.value.trim().length < 2) { box.hidden = true; return; }
    var list = searchStreets(input.value, 30);
    if (!list.length) { box.innerHTML = '<div class="sug-empty">Aucune rue trouvée.</div>'; box.hidden = false; return; }
    list.forEach(function (r) {
      var meta = SECTOR_META[r.secteur] || SECTOR_META.CENTRE;
      var item = el("button", "sug-item");
      item.innerHTML = '<span>' + esc(r.rue) + '</span><span class="pill" style="background:' + meta.color + ';color:#fff">' + esc(meta.label) + '</span>';
      item.addEventListener("click", function () { input.value = ""; box.hidden = true; nav("street", { street: r.rue, sector: r.secteur }); });
      box.appendChild(item);
    });
    box.hidden = false;
  });
  document.addEventListener("click", function (e) { if (!e.target.closest(".search-wrap")) box.hidden = true; });
}

function toast(msg) {
  var t = $("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(function () { t.classList.remove("show"); }, 1900);
}
function copyText(txt) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(function () { toast("Compte rendu copié ✅"); }, function () { legacyCopy(txt); });
  } else legacyCopy(txt);
}
function legacyCopy(txt) {
  var ta = el("textarea"); ta.value = txt; document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); toast("Compte rendu copié ✅"); } catch (e) { toast("Copie impossible"); }
  document.body.removeChild(ta);
}
function initReportActions() {
  $("expCopy").onclick = function () { copyText(reportText()); };
  $("expShare").onclick = function () {
    var txt = reportText();
    if (navigator.share) navigator.share({ title: "Compte rendu tournée", text: txt }).catch(function () {});
    else copyText(txt);
  };
  $("expWhatsapp").onclick = function () { window.open("https://wa.me/?text=" + encodeURIComponent(reportText()), "_blank"); };
  $("expSms").onclick = function () { window.location.href = "sms:?&body=" + encodeURIComponent(reportText()); };
  $("expMail").onclick = function () {
    var subject = "Compte rendu tournée préventive — " + new Date().toLocaleDateString("fr-FR");
    window.location.href = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(reportText());
  };
  $("expCsv").onclick = exportCSV;
  $("expXls").onclick = exportXLS;
  $("expPrint").onclick = function () { window.print(); };
}

function bindChrome() {
  $("backStreets").onclick = function () { history.back(); };
  $("backStreet").onclick = function () { history.back(); };
  $("backReport").onclick = function () { history.back(); };
  $("goReport").onclick = function () { nav("report", {}); };

  var agent = $("agentInput");
  agent.value = state.agent || "";
  agent.oninput = function () { state.agent = agent.value; saveSoon(); };

  $("resetBtn").onclick = function () {
    if (!confirm("Effacer toute la tournée en cours ?")) return;
    if (!confirm("Confirmer : cette action est définitive.")) return;
    resetAll(); nav("sectors", {}, true); toast("Tournée réinitialisée");
  };

  $("streetFilter").oninput = function (e) { renderStreetList(e.target.value); };

  window.addEventListener("online", function () {
    updateHeader();
    if (currentStreet && $("view-street").classList.contains("active")) {
      var d = streetState(currentStreet);
      if (!d.nums.length) { d.fetched = false; ensureNumbers(d).then(function () { renderNums(d, $("numFilter").value); }); }
    }
  });
  window.addEventListener("offline", updateHeader);

  // Clavier mobile : recentre le champ actif (délégation → champs dynamiques inclus).
  document.addEventListener("focusin", function (e) {
    if (e.target.matches && e.target.matches("input, textarea")) {
      setTimeout(function () { e.target.scrollIntoView({ block: "center", behavior: "smooth" }); }, 300);
    }
  });
}

function initRouter() {
  window.addEventListener("popstate", function (e) {
    if (e.state && e.state.view) applyRoute(e.state.view, e.state);
    else applyRoute("sectors", {});
  });
  history.replaceState({ view: "sectors" }, "", "#sectors");
  applyRoute("sectors", {});
}

function main() {
  load();
  loadStreets().then(function () {
    bindChrome();
    initGlobalSearch();
    initReportActions();
    initRouter();
    updateHeader();
  });
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("../service-worker.js").catch(function () {});
  if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(function () {});
}
main();

})();
</script>
